{% extends "base.html" %}

{% block title %}Create Account — BANKAHEAD{% endblock %}

{% block content %}
<div class="sign_up">
    <div class="sign_up_container">
        <div class="crt_user_password">Create Username and Password</div>

        <form action="{{ url_for('create_account') }}" method="POST">
            <div class="usrnme">
                <input type="text" name="usrnme" placeholder="Create New Username" required>
            </div>
            <div class="psswrd">
                <input type="password" name="psswrd" placeholder="Create New Password" required>
            </div>
            <div class="cnfrm_psswrd">
                <input type="password" name="cnfrm_psswrd" placeholder="Confirm New Password" required>
            </div>
            <button type="submit" class="crte_account__btn">Create New Account</button>
        </form>
    </div>
</div>
{% endblock %}
